# ============================================================
# AgriConnect Backend CI Pipeline (Node.js + Express + Prisma)
# ============================================================
# Triggers: PRs and pushes to main targeting the server/ directory.
# Stages: Install → Lint → Test → Audit → Docker Build Validation
# Strategy: Fail-fast with aggressive dependency caching.

name: "CI: Backend (Node.js)"

on:
  push:
    branches: [main, develop]
    paths:
      - "server/**"
      - ".github/workflows/ci-backend.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "server/**"
      - ".github/workflows/ci-backend.yml"

# Cancel in-progress runs on new pushes to the same branch
concurrency:
  group: ci-backend-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "18"
  WORKING_DIR: "./server"

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: Lint — Enforce code quality standards
  # ──────────────────────────────────────────────
  lint:
    name: "🔍 Lint & Format Check"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.WORKING_DIR }}

      - name: Run ESLint
        run: npx eslint . --ext .js,.mjs --max-warnings=0
        working-directory: ${{ env.WORKING_DIR }}

  # ──────────────────────────────────────────────
  # Stage 2: Test — Unit & integration tests
  # ──────────────────────────────────────────────
  test:
    name: "🧪 Unit Tests"
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.WORKING_DIR }}

      - name: Run tests
        run: npm test --if-present
        working-directory: ${{ env.WORKING_DIR }}
        env:
          NODE_ENV: test
          DATABASE_URL: "mysql://root:root@localhost:3306/agriconnect_test"

  # ──────────────────────────────────────────────
  # Stage 3: Security — Dependency vulnerability audit
  # ──────────────────────────────────────────────
  security-audit:
    name: "🛡️ Security Audit (npm)"
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ env.WORKING_DIR }}

      - name: Run npm audit (high + critical only)
        run: npm audit --audit-level=high
        working-directory: ${{ env.WORKING_DIR }}
        continue-on-error: true # Report but don't block PRs initially

  # ──────────────────────────────────────────────
  # Stage 4: Docker — Validate containerization
  # ──────────────────────────────────────────────
  docker-build:
    name: "🐳 Docker Build Validation"
    runs-on: ubuntu-latest
    needs: [test, security-audit]
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.WORKING_DIR }}
          push: false
          tags: agriconnect-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
