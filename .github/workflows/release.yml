# ============================================================
# AgriConnect — Enhanced DevSecOps Release Pipeline
# ============================================================
# Triggered on tags (v*) for releases. Builds, signs, and
# generates SBOM for Docker images before pushing to ECR.

name: "Release: Build, Sign & Publish"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  id-token: write # Required for cosign OIDC signing

env:
  AWS_REGION: ap-south-1

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: Semantic Version Extraction
  # ──────────────────────────────────────────────
  version:
    name: "🏷️ Extract Version"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
    steps:
      - name: Extract semver from tag
        id: semver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

  # ──────────────────────────────────────────────
  # Stage 2: Build, Scan, Sign Backend Image
  # ──────────────────────────────────────────────
  release-backend:
    name: "🐳 Backend Release"
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        env:
          ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          role-session-name: github-agriconnect-backend-release
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/agriconnect-backend:${{ needs.version.outputs.version }}
            ${{ steps.ecr-login.outputs.registry }}/agriconnect-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.ecr-login.outputs.registry }}/agriconnect-backend:${{ needs.version.outputs.version }}
          format: spdx-json
          output-file: backend-sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-sbom
          path: backend-sbom.spdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Container Image (Keyless)
        run: |
          cosign sign --yes \
            ${{ steps.ecr-login.outputs.registry }}/agriconnect-backend:${{ needs.version.outputs.version }}

  # ──────────────────────────────────────────────
  # Stage 3: Build, Scan, Sign AI Engine Image
  # ──────────────────────────────────────────────
  release-ai-engine:
    name: "🧠 AI Engine Release"
    runs-on: ubuntu-latest
    needs: version
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        env:
          ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          role-session-name: github-agriconnect-ai-release
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push AI Engine Image
        uses: docker/build-push-action@v5
        with:
          context: ./ai_engine
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/agriconnect-ai-engine:${{ needs.version.outputs.version }}
            ${{ steps.ecr-login.outputs.registry }}/agriconnect-ai-engine:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.ecr-login.outputs.registry }}/agriconnect-ai-engine:${{ needs.version.outputs.version }}
          format: spdx-json
          output-file: ai-engine-sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-engine-sbom
          path: ai-engine-sbom.spdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Container Image (Keyless)
        run: |
          cosign sign --yes \
            ${{ steps.ecr-login.outputs.registry }}/agriconnect-ai-engine:${{ needs.version.outputs.version }}
