apiVersion: v1
kind: List
items:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: api-gateway
      namespace: agriconnect
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: api-gateway
      template:
        metadata:
          labels:
            app: api-gateway
        spec:
          containers:
            - name: api-gateway
              image: ghcr.io/agriconnect/api-gateway:latest
              ports:
                - containerPort: 8080
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
  - apiVersion: v1
    kind: Service
    metadata:
      name: api-gateway
      namespace: agriconnect
    spec:
      selector:
        app: api-gateway
      ports:
        - port: 8080
          targetPort: 8080

  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: auth-service
      namespace: agriconnect
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: auth-service
      template:
        metadata:
          labels:
            app: auth-service
        spec:
          containers:
            - name: auth-service
              image: ghcr.io/agriconnect/auth-service:latest
              ports: [{ containerPort: 4001 }]
  - apiVersion: v1
    kind: Service
    metadata:
      name: auth-service
      namespace: agriconnect
    spec:
      selector: { app: auth-service }
      ports: [{ port: 4001, targetPort: 4001 }]

