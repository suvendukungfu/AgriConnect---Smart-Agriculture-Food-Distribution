apiVersion: v1
kind: Secret
metadata:
  name: agriconnect-secrets
  namespace: agriconnect
type: Opaque
stringData:
  DATABASE_URL: "postgresql://username:password@postgres:5432/agriconnect"
  REDIS_URL: "redis://redis:6379"
  KAFKA_BROKERS: "kafka:9092"
  JWT_PUBLIC_KEY: "replace-me"
  JWT_PRIVATE_KEY: "replace-me"
