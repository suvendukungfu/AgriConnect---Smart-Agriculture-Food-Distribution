version: "3.9"

services:
  api-gateway:
    build: ../../gateway/api-gateway
    ports:
      - "8080:8080"
    env_file:
      - ../../gateway/api-gateway/.env.example
    depends_on:
      - auth-service
      - user-service
      - farm-service
      - crop-service
      - marketplace-service
      - order-service
      - payment-service
      - notification-service
      - advisory-service
      - analytics-service
      - satellite-service
      - ai-service
      - admin-service

  auth-service:
    build: ../../services/auth-service
    ports: ["4001:4001"]
    env_file: [../../services/auth-service/.env.example]

  user-service:
    build: ../../services/user-service
    ports: ["4002:4002"]
    env_file: [../../services/user-service/.env.example]

  farm-service:
    build: ../../services/farm-service
    ports: ["4003:4003"]
    env_file: [../../services/farm-service/.env.example]

  crop-service:
    build: ../../services/crop-service
    ports: ["4004:4004"]
    env_file: [../../services/crop-service/.env.example]

  marketplace-service:
    build: ../../services/marketplace-service
    ports: ["4005:4005"]
    env_file: [../../services/marketplace-service/.env.example]

  order-service:
    build: ../../services/order-service
    ports: ["4006:4006"]
    env_file: [../../services/order-service/.env.example]

  payment-service:
    build: ../../services/payment-service
    ports: ["4007:4007"]
    env_file: [../../services/payment-service/.env.example]

  notification-service:
    build: ../../services/notification-service
    ports: ["4008:4008"]
    env_file: [../../services/notification-service/.env.example]

  advisory-service:
    build: ../../services/advisory-service
    ports: ["4009:4009"]
    env_file: [../../services/advisory-service/.env.example]

  analytics-service:
    build: ../../services/analytics-service
    ports: ["4010:4010"]
    env_file: [../../services/analytics-service/.env.example]

  satellite-service:
    build: ../../services/satellite-service
    ports: ["4011:4011"]

  ai-service:
    build: ../../services/ai-service
    ports: ["4012:4012"]

  admin-service:
    build: ../../services/admin-service
    ports: ["4013:4013"]
    env_file: [../../services/admin-service/.env.example]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agriconnect
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
    ports:
      - "9200:9200"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
